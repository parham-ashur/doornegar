name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  backend-compile:
    name: Backend import + syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m compileall -q app
      - name: Install minimal deps for import check
        run: |
          pip install --upgrade pip
          pip install -e . 2>&1 | tail -20 || true
      - name: Import smoke test
        run: |
          python -c "import app.main" || (echo "::error::backend import failed" && exit 1)
